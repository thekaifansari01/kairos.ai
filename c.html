<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>kairos AI – Elite Cybersecurity & Coding Assistant</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Syntax highlighting: atom-one-dark -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Markdown parser & highlight JS -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="https://unpkg.com/edge-tts-universal@0.2.2/dist/browser.js"></script>

    <!-- Modular CSS -->
    <link rel="stylesheet" href="chatui/base.css">
    <link rel="stylesheet" href="chatui/sidebar.css">
    <link rel="stylesheet" href="chatui/welcome.css">
    <link rel="stylesheet" href="chatui/messages.css">
    <link rel="stylesheet" href="chatui/think-box.css">
    <link rel="stylesheet" href="chatui/code-blocks.css">
    <link rel="stylesheet" href="chatui/table_markdown.css">
    <link rel="stylesheet" href="chatui/input-area.css">
    <link rel="stylesheet" href="chatui/animations.css">
    <link rel="stylesheet" href="chatui/navbar.css">
    <link rel="stylesheet" href="chatui/markdown.css">
    <link rel="stylesheet" href="chatui/modals.css">
    <link rel="stylesheet" href="chatui/interpreter.css">
</head>
<body>
    <div class="app-container">
        <!-- ================= SIDEBAR ================= -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🐬</span>
                    <h1 class="logo-text">kairos<span>.ai</span></h1>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">
                    <svg id="close-sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                        <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                            <rect width="18" height="18" x="3" y="3" rx="2" />
                            <path d="M9 3v18m7-6l-3-3l3-3" />
                        </g>
                    </svg>
                    <svg id="open-sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" style="display: none;">
                        <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                            <rect width="18" height="18" x="3" y="3" rx="2" />
                            <path d="M9 3v18m5-12l3 3l-3 3" />
                        </g>
                    </svg>
                </button>
            </div>

            <!-- New Chat Button (sidebar) -->
            <button class="new-chat-btn" onclick="createNewChat()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16" style="display: inline-block; vertical-align: middle;">
                    <path fill="currentColor" fill-rule="evenodd" d="M1.5 4A1.5 1.5 0 0 1 3 2.5h10A1.5 1.5 0 0 1 14.5 4v3.25a.75.75 0 0 0 1.5 0V4a3 3 0 0 0-3-3H3a3 3 0 0 0-3 3v11.25a.75.75 0 0 0 1.28.53L4.063 13H8.25a.75.75 0 0 0 0-1.5H3.443l-.22.22L1.5 13.44zM13 14a.75.75 0 0 1-.75-.75v-1.5h-1.5a.75.75 0 0 1 0-1.5h1.5v-1.5a.75.75 0 0 1 1.5 0v1.5h1.5a.75.75 0 0 1 0 1.5h-1.5v1.5A.75.75 0 0 1 13 14" clip-rule="evenodd" />
                </svg>
                <span>New Chat</span>
            </button>

            <!-- Search chats -->
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Search chats...">
                <button id="clear-search" class="clear-search hidden">✕</button>
            </div>

            <!-- Chat history list -->
            <div class="chat-history" id="chat-history-container">
                <div id="chat-history-list" class="chat-history-list">
                    <div class="history-placeholder">Sign in to see your chats</div>
                </div>
            </div>

            <!-- Clear all chats button -->
            <button id="clear-all-chats" class="clear-chats-btn" title="Clear all chats">
                <i class="fas fa-trash-alt"></i>
                <span>Clear all chats</span>
            </button>

            <!-- Sidebar footer (user info) -->
            <div class="sidebar-footer" id="sidebar-footer">
                <div id="user-info-container" class="user-info-container">
                    <div class="user-info-placeholder">
                        <div class="user-avatar">👤</div>
                        <div class="user-details">
                            <span class="user-name">Guest User</span>
                            <span class="user-status offline">● Offline</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ================= MAIN CHAT AREA ================= -->
        <main class="chat-area">
            <!-- Welcome screen -->
            <div id="welcome-screen" class="welcome-screen">
                <div class="welcome-content">
                    <!-- Lottie animation container (or fallback emoji) -->
                    <div id="dolphin-animation" class="big-logo" style="width: 140px; height: 140px; margin: 0 auto;"></div>

                    <h2 class="greeting">Hey, <span id="welcome-username">Guest</span></h2>

                    <!-- Question line: what are we building today? -->
                    <h2 class="question">Took you long enough to ask.</h2>

                    <p class="subtitle">I've been waiting. Let's go.</p>
                </div>
            </div>

            <!-- Chat header -->
            <div id="chat-header" class="chat-header hidden">
                <h2 id="chat-title" class="chat-title">New Chat</h2>
            </div>

            <!-- Floating navbar -->
            <div class="floating-navbar">
                <button class="nav-item" id="createNewChat()" title="New Chat">
                    <i class="fas fa-plus-circle"></i>
                    <span>New Chat</span>
                </button>
                <button class="nav-item" id="nav-share" title="Share Chat">
                    <i class="fas fa-share-alt"></i>
                    <span>Share</span>
                </button>
                <button class="nav-item" id="nav-export" title="Export Chat">
                    <i class="fas fa-download"></i>
                    <span>Export</span>
                </button>
                <button class="nav-item" id="nav-templates" title="Manage Templates">
                    <i class="fas fa-scroll"></i>
                    <span>Templates</span>
                </button>
                <button class="nav-item" id="index-project-btn" title="Index current files as project">
                    <i class="fas fa-database"></i>
                    <span>Index Project</span>
                </button>
                <!-- Preferences Button -->
                <button class="nav-item" id="nav-preferences" title="User Preferences">
                    <i class="fas fa-sliders-h"></i>
                    <span>Preferences</span>
                </button>
                <button class="nav-item" id="nav-settings" title="API Settings">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </button>
                <div class="nav-divider"></div>
                <div class="model-indicator" id="model-indicator" title="Current Model - Click to change">
                    <i class="fas fa-microchip"></i>
                    <span>Loading...</span>
                </div>
            </div>

            <!-- Chat messages container -->
            <div id="chat-messages" class="chat-messages hidden"></div>

            <!-- Back to bottom button -->
            <button id="back-to-bottom-btn" class="back-to-bottom" title="Go to bottom">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>

            <!-- Input area footer -->
            <footer class="input-area">
                <div class="input-container">
                    <div id="file-attachment-container" class="file-attachment-container"></div>

                    <div class="input-wrapper">
                        <div class="model-selector">
                            <button id="model-btn" class="model-btn" title="Menu">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                            <div id="model-dropdown" class="model-dropdown hidden"></div>
                        </div>
                        <textarea id="user-input" rows="1" placeholder="Ask kairos anything... (Shift + Enter for new line)" autocomplete="off"></textarea>
                        <button id="action-btn" class="action-btn send-mode" title="Send message">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="19" x2="12" y2="5"></line>
                                <polyline points="5 12 12 5 19 12"></polyline>
                            </svg>
                        </button>
                    </div>
                    <p class="disclaimer">kairos can make mistakes. Verify critical code before execution.</p>
                </div>
            </footer>
        </main>
    </div>

    <!-- ================= GLOBAL MODAL ================= -->
    <div id="global-modal" class="global-modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modal-title">Modal Title</h3>
                <button class="modal-close-btn" id="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- ================= JAVASCRIPT MODULES ================= -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js"
            }
        }
    </script>

    <!-- Core Config & Memory (Sabse Pehle) -->
    <script src="js/modules/core/config.js"></script>
    <script src="js/modules/core/memory.js"></script>

    <!-- Formatter (UI helpers, code highlighting) -->
    <script src="js/ui/formatter.js"></script>

    <!-- Firebase & History (ES Modules) -->
    <script type="module" src="js/modules/auth/firebase.js"></script>
    <script type="module" src="js/modules/history/history-index.js"></script>

    <!-- API Module -->
    <script src="js/modules/api/api.js"></script>

    <!-- Toast & Validation (Utils - Toast pehle kyunki validation use karta hai) -->
    <script src="js/utils/toast.js"></script>
    <script src="js/utils/validation.js"></script>

    <!-- Main UI Module (Depends on formatter, api, toast, validation) -->
    <script src="js/ui/ui.js"></script>

    <!-- Feature Guard (Depends on firebase auth state) -->
    <script src="js/modules/auth/featureGuard.js"></script>

    <!-- Main Core (Depends on UI, API, memory) -->
    <script src="js/modules/core/main.js"></script>

    <!-- RAG Modules (Independent, can load anytime after core) -->
    <script src="js/modules/rag/code-chunker.js"></script>
    <script src="js/modules/rag/vector-store.js"></script>
    <script src="js/modules/rag/embeddings.js"></script>

    <!-- Optional UI Enhancements -->
    <script src="js/ui/settings-popup.js"></script>
    <script src="js/ui/lottie-loader.js"></script>
    <script src="js/ui/template-suggestions.js"></script>

    <!-- Python Interpreter (Heavy, load last) -->
    <script src="js/modules/interpreter/interpreter.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('✅ Service Worker registered', reg.scope))
                .catch(err => console.error('❌ SW registration failed', err));
        }
    </script>
</body>
</html>
